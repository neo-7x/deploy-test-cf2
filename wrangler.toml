name = "deploy-test"
main = "./.output/server/index.mjs"
compatibility_date = "2025-07-15"
compatibility_flags = ["nodejs_compat"]

# Hyperdrive pools + caches Postgres connections at the edge — required for
# Workers since they can't hold long-lived TCP pools of their own.
#
# Before deploy, create the binding:
#   wrangler hyperdrive create deploy-test \
#     --connection-string="postgresql://USER:PASS@HOST:5432/DB"
# then paste the returned id below.
[[hyperdrive]]
binding = "POSTGRES"
id = "dc6fb35f7e294fe5abafccacf7cf6b53"

# All env vars live here as plaintext [vars] with empty defaults so the
# Deploy Button form renders them as plain text inputs (the user can see
# what they're typing) rather than encrypted-secret masked inputs.
#
# Trade-off: CF's form won't enforce "required" on any of these — the user
# could click through leaving DATABASE_URL / BETTER_AUTH_SECRET /
# SYSTEM_ADMIN_EMAILS blank. Build-time/runtime assertions will catch this
# later (drizzle-kit will fail on empty DATABASE_URL; better-auth will
# throw on empty BETTER_AUTH_SECRET). Users who want their values to live
# as actual Secrets can rotate them post-deploy via the dashboard.
[vars]
DATABASE_URL = ""
BETTER_AUTH_SECRET = ""
SYSTEM_ADMIN_EMAILS = ""
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
GITHUB_CLIENT_ID = ""
GITHUB_CLIENT_SECRET = ""
AUTH_EMAIL_ENABLED = ""
RESEND_API_KEY = ""
RESEND_FROM = ""
AUTH_EMAIL_VERIFICATION = ""

[assets]
directory = "./.output/public/"
binding = "ASSETS"

[observability]
enabled = true
