name = "deploy-test"
main = "./.output/server/index.mjs"
compatibility_date = "2025-07-15"
compatibility_flags = ["nodejs_compat"]

# Hyperdrive pools + caches Postgres connections at the edge — required for
# Workers since they can't hold long-lived TCP pools of their own.
#
# Before deploy, create the binding:
#   wrangler hyperdrive create deploy-test \
#     --connection-string="postgresql://USER:PASS@HOST:5432/DB"
# then paste the returned id below.
[[hyperdrive]]
binding = "POSTGRES"
id = "dc6fb35f7e294fe5abafccacf7cf6b53"

# Required secrets (BETTER_AUTH_SECRET, SYSTEM_ADMIN_EMAILS, DATABASE_URL for
# build-time migrations) come from .env.example — the Deploy Button renders
# them as encrypted secrets.
#
# Optional env vars live here as plaintext [vars] with empty defaults so the
# Deploy Button form treats them as not-required (leaving them blank is OK).
# Users who need OAuth or Resend will fill them in at deploy time and can
# later rotate them to Secrets via the dashboard if desired.
[vars]
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
GITHUB_CLIENT_ID = ""
GITHUB_CLIENT_SECRET = ""
AUTH_EMAIL_ENABLED = ""
RESEND_API_KEY = ""
RESEND_FROM = ""
AUTH_EMAIL_VERIFICATION = ""

[assets]
directory = "./.output/public/"
binding = "ASSETS"

[observability]
enabled = true
